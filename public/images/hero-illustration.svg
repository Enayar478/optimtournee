<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond dégradé subtil -->
  <rect width="600" height="400" rx="16" fill="url(#bgGradient)"/>
  
  <!-- Routes / Lignes -->
  <g opacity="0.3">
    <path d="M50 200 Q150 100 250 200 T450 150" stroke="#2D5A3D" stroke-width="2" stroke-dasharray="8 8" fill="none"/>
    <path d="M100 300 Q200 250 300 300 T500 280" stroke="#4A90A4" stroke-width="2" stroke-dasharray="8 8" fill="none"/>
  </g>
  
  <!-- Points d'arrêt (avant optimisation) - grisés -->
  <circle cx="150" cy="150" r="8" fill="#E5E5E5" stroke="#8A8A8A" stroke-width="2"/>
  <circle cx="250" cy="200" r="8" fill="#E5E5E5" stroke="#8A8A8A" stroke-width="2"/>
  <circle cx="350" cy="180" r="8" fill="#E5E5E5" stroke="#8A8A8A" stroke-width="2"/>
  <circle cx="450" cy="150" r="8" fill="#E5E5E5" stroke="#8A8A8A" stroke-width="2"/>
  
  <!-- Route optimisée (ligne verte) -->
  <path d="M150 150 L250 200 L350 180 L450 150" stroke="#2D5A3D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Points d'arrêt optimisés (numérotés) -->
  <!-- Point 1 -->
  <circle cx="150" cy="150" r="16" fill="#2D5A3D"/>
  <text x="150" y="156" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">1</text>
  
  <!-- Point 2 -->
  <circle cx="250" cy="200" r="16" fill="#2D5A3D"/>
  <text x="250" y="206" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">2</text>
  
  <!-- Point 3 -->
  <circle cx="350" cy="180" r="16" fill="#4A90A4"/>
  <text x="350" y="186" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">3</text>
  
  <!-- Point 4 -->
  <circle cx="450" cy="150" r="16" fill="#E07B39"/>
  <text x="450" y="156" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">4</text>
  
  <!-- Badge "Optimisé" -->
  <g transform="translate(420, 240)">
    <rect width="120" height="40" rx="20" fill="#E07B39"/>
    <text x="60" y="26" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="600">-23% de trajet</text>
  </g>
  
  <!-- Météo widget -->
  <g transform="translate(50, 50)">
    <rect width="100" height="80" rx="12" fill="white" fill-opacity="0.9"/>
    <text x="50" y="30" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="12" font-weight="500">Météo</text>
    <text x="50" y="55" text-anchor="middle" fill="#4A90A4" font-family="Inter, sans-serif" font-size="24" font-weight="700">18°C</text>
    <text x="50" y="70" text-anchor="middle" fill="#8A8A8A" font-family="Inter, sans-serif" font-size="11">Ensoleillé</text>
  </g>
  
  <!-- Définitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5EC"/>
      <stop offset="100%" stop-color="#E8F4F7"/>
    </linearGradient>
  </defs>
</svg>
